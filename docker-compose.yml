services:
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/invest_assistant.db
    ports:
      - "8000:8000"
    volumes:
      - invest_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ui:
    build: .
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      DATABASE_URL: sqlite:////data/invest_assistant.db
    command: ["python", "-m", "streamlit", "run", "app/ui/streamlit_app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    ports:
      - "8501:8501"
    volumes:
      - invest_data:/data
    depends_on:
      api:
        condition: service_healthy

volumes:
  invest_data:
